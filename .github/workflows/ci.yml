name: Validate boards
on:
  pull_request:
  push:
    branches: [main]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --no-audit --no-fund
      - run: npm run validate
      # TODO(#127 follow-up): headless compile smoke test against the Case
      # Maker engine (assert one shell per part — the STL floater check).
